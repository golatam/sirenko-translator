<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Translator Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings" role="main">
    <h1>Translator Settings</h1>

    <div class="field">
      <label id="engineLabel">Translation Engine</label>
      <div class="mode-toggle" role="radiogroup" aria-labelledby="engineLabel">
        <button type="button" id="modeLocal" class="mode-btn" role="radio" aria-checked="false">Local Model</button>
        <button type="button" id="modeCloud" class="mode-btn" role="radio" aria-checked="false">Cloud (Claude)</button>
      </div>
      <p class="hint" id="modeHint" aria-live="polite">OPUS-MT models running locally. First use downloads ~300 MB per language pair.</p>

      <div id="modelSection" class="model-section" style="display: none;">
        <button type="button" id="downloadBtn" class="download-btn">Download Models</button>
        <div id="downloadStatus" class="download-status" aria-live="polite"></div>
        <div id="progressBar" class="progress-bar" style="display: none;" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="field" id="apiKeyField">
      <label for="apiKey">Claude API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      <p class="hint">Your Anthropic API key. Stored locally on your machine.</p>
    </div>

    <div class="field">
      <label for="defaultLang">Default Target Language</label>
      <select id="defaultLang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="ru">Russian</option>
      </select>
      <p class="hint">Default target language for translations.</p>
    </div>

    <div class="field">
      <label class="checkbox-label">
        <input type="checkbox" id="enabled">
        <span>Enable clipboard watcher</span>
      </label>
      <p class="hint">Double Cmd+C triggers translation popup.</p>
    </div>

    <div class="actions">
      <span id="status" class="status" aria-live="polite"></span>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
